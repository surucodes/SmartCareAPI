<style>
        .pattern-bg {
            background-color: #FAFAF8;
            background-image: radial-gradient(#A8D5B8 1px, transparent 1px);
            background-size: 24px 24px;

            box-shadow: 0 4px 24px rgba(19, 43, 26, 0.08);
        }

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-md">
<!-- Subtle Background Gradient/Pattern Overlay -->
<div class="absolute inset-0 pattern-bg opacity-30 z-0"></div>
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-primary-fixed-dim/20 to-transparent z-0"></div>
<!-- Login Card Container -->
<main class="relative z-10 w-full max-w-[420px] px-margin-mobile md:px-0">
<div class="bg-surface-container-lowest rounded-lg ambient-shadow p-8 border border-outline-variant/30 relative overflow-hidden">
<!-- Decorative subtle top border accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-secondary-container"></div>
<!-- Header Section -->
<div class="text-center mb-8 flex flex-col items-center">
<!-- Logo -->
<div class="flex items-center justify-center gap-2 mb-6">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<span class="font-headline-sm text-headline-sm text-primary">Spandana Hospital</span>
</div>
<!-- Labels & Titles -->
<span class="font-label-section text-label-section text-secondary uppercase tracking-widest mb-2 block">STAFF PORTAL</span>
<h1 class="font-headline-md text-headline-md text-text-primary mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-text-muted">Sign in to manage appointments</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-DEFAULT border-outline-variant bg-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors font-body-md text-body-md text-text-primary outline-none" id="email" name="email" placeholder="staff@spandanahospital.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 pr-12 rounded-DEFAULT border-outline-variant bg-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors font-body-md text-body-md text-text-primary outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 px-3 flex items-center text-text-muted hover:text-text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary rounded-full font-label-md text-label-md hover:bg-primary transition-colors duration-200 flex items-center justify-center shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Bottom Navigation Link -->
<div class="mt-8 text-center">
<a class="font-body-sm text-body-sm text-text-muted hover:text-secondary transition-colors inline-flex items-center gap-1 group" href="#">
                    Patient? Book your appointment here
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</a>
</div>
</div>
</main>
<!-- Optional subtle botanical decoration (using pure css shapes for abstract feel) -->
<div class="absolute bottom-0 right-0 w-64 h-64 bg-primary-fixed-dim/10 rounded-full blur-3xl -z-10 translate-x-1/3 translate-y-1/3"></div>
<div class="absolute top-1/4 left-0 w-48 h-48 bg-secondary-fixed/10 rounded-full blur-3xl -z-10 -translate-x-1/2"></div>
